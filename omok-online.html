<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온라인 오목 - 대결 & 관람</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; gap: 12px;
    background: #2b2b30; color: #f0f0f0;
    font-family: -apple-system, "Malgun Gothic", sans-serif; padding: 20px;
  }
  h1 { margin: 4px 0; font-size: 22px; }
  .panel {
    background: #3a3a42; border-radius: 12px; padding: 18px;
    width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 12px;
  }
  .panel h2 { margin: 0; font-size: 16px; }
  .row { display: flex; gap: 8px; }
  input {
    flex: 1; font-size: 15px; padding: 10px; border-radius: 8px;
    border: 1px solid #555; background: #222; color: #fff; text-transform: uppercase;
  }
  button {
    font-size: 15px; padding: 10px 16px; border: none; border-radius: 8px;
    background: #5b8def; color: #fff; cursor: pointer; font-weight: 600; white-space: nowrap;
  }
  button:hover { background: #4a7ad6; }
  button:disabled { background: #555; cursor: not-allowed; opacity:.7; }
  button.gray { background: #555; }
  button.gray:hover { background: #444; }
  button.green { background: #3ba55d; }
  button.green:hover { background: #339150; }
  button.orange { background: #e08b3b; }
  button.orange:hover { background: #c9772b; }
  .code-box {
    display: flex; gap: 8px; align-items: center; background: #222;
    padding: 10px 12px; border-radius: 8px; font-size: 20px; font-weight: 700;
    letter-spacing: 3px; justify-content: space-between;
  }
  .code-box button { font-size: 13px; letter-spacing: 0; padding: 6px 12px; }
  .hint { font-size: 12px; color: #aaa; line-height: 1.5; }
  .divider { border-top: 1px solid #555; margin: 4px 0; }
  #status {
    font-size: 17px; font-weight: 600; padding: 8px 18px;
    background: #3a3a42; border-radius: 999px; min-height: 22px; text-align: center;
  }
  .seats { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; font-size:13px; }
  .seat { background:#222; padding:5px 12px; border-radius:999px; }
  .stone-dot { display: inline-block; width: 13px; height: 13px; border-radius: 50%; vertical-align: middle; margin-right: 5px; }
  .black-dot { background: #1a1a1a; border: 1px solid #888; }
  .white-dot { background: #fafafa; border: 1px solid #888; }
  #notice { font-size:13px; color:#ffd479; min-height:18px; text-align:center; }
  canvas { background: #e3b66b; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.4); touch-action: manipulation; }
  .hidden { display: none !important; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content:center; }
  .myinfo { font-size: 13px; color: #ccc; text-align: center; }
  @media (max-width: 480px){
    body { padding: 12px; gap: 9px; }
    h1 { font-size: 19px; }
    #status { font-size: 15px; }
    .code-box { font-size: 18px; }
  }
</style>
</head>
<body>
  <h1>온라인 오목 ⚫⚪</h1>

  <!-- 로비 -->
  <div id="lobby" class="panel">
    <h2>① 방 만들기</h2>
    <button id="createBtn">방 만들기 (내가 흑, 선공)</button>
    <div class="hint">처음 입장하는 사람이 눌러 방을 엽니다.</div>

    <div class="divider"></div>
    <h2>② 참가 / 관람</h2>
    <div class="hint">방이 열려 있으면 코드 없이 바로 들어갑니다.</div>
    <div class="row">
      <button id="playBtn" style="flex:1;">⚪ 플레이어로 참가</button>
      <button id="watchBtn" class="green" style="flex:1;">👀 관람하기</button>
    </div>
    <div id="lobbyMsg" class="hint"></div>
  </div>

  <!-- 게임 -->
  <div id="game" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div id="status"></div>
    <div class="seats">
      <span class="seat" id="seatBlack">⚫ 흑: -</span>
      <span class="seat" id="seatWhite">⚪ 백: -</span>
      <span class="seat" id="seatSpec">👀 관람 0</span>
    </div>
    <div id="notice"></div>
    <canvas id="board"></canvas>
    <div class="controls">
      <button id="newGameBtn" class="gray hidden">새 게임</button>
      <button id="joinBlackBtn" class="orange hidden">⚫ 흑으로 참여</button>
      <button id="joinWhiteBtn" class="green hidden">⚪ 백으로 참여</button>
      <button id="leaveBtn" class="gray">나가기</button>
    </div>
  </div>

  <div class="hint" id="connState"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>
(function(){
  // ===== 판 설정 =====
  const SIZE=15;
  let CELL=36, PAD=26, DIM=PAD*2+CELL*(SIZE-1);
  let canvas, ctx;

  // ===== 공유 게임 상태 (호스트가 권한 보유) =====
  let board, current, gameOver, winner, lastMove;
  let seat={1:null, 2:null};   // 색 → 식별자(id), 흑=1 백=2
  let specCount=0;

  // ===== 로컬/네트워크 =====
  let peer, isHost=false, myId='', myColor=0;
  let conns=[];                // 호스트 전용: 모든 게스트 연결
  let hostConn=null;           // 게스트 전용
  let inGame=false;
  let lastOppId='__init__';    // 상대 입퇴장 감지용

  const $=id=>document.getElementById(id);

  const ROOM_ID='omok-musun-room-7f3a9c2e1b';   // 코드 없이 모두 같은 방

  // ---------- 호스트: 방 만들기 ----------
  $('createBtn').addEventListener('click', ()=>{
    $('createBtn').disabled=true; $('connState').textContent='방 만드는 중…';
    isHost=true;
    peer=new Peer(ROOM_ID);
    peer.on('open', ()=>{
      myId='HOST';
      seat={1:'HOST', 2:null};   // 호스트가 흑
      enterGame();
      resetBoard();
      pushState();
    });
    peer.on('connection', c=>registerConn(c));
    peer.on('error', e=>{
      if(e.type==='unavailable-id'){
        $('lobbyMsg').textContent='이미 방이 열려 있어요. "플레이어로 참가" 또는 "관람하기"로 들어오세요.';
        isHost=false; $('createBtn').disabled=false;
        try{ peer.destroy(); }catch(_){}
      } else {
        $('connState').textContent='오류: '+e.type+' (새로고침)'; $('createBtn').disabled=false;
      }
    });
  });

  function registerConn(c){
    conns.push(c);
    c.on('data', msg=>hostHandle(c,msg));
    c.on('close', ()=>{
      conns=conns.filter(x=>x!==c);
      const id=c.peer;
      if(seat[1]===id) seat[1]=null;
      if(seat[2]===id) seat[2]=null;
      recountSpecs(); pushState();
    });
  }

  function hostHandle(c,msg){
    const id=c.peer;
    if(msg.type==='hello'){
      if(msg.role==='player'){
        if(!seat[2]) seat[2]=id;
        else if(!seat[1]) seat[1]=id;   // 흑 자리가 비어있으면(드문 경우) 흑으로
        // 둘 다 차있으면 관람
      }
      recountSpecs(); pushState();
    } else if(msg.type==='intent'){
      const col=(seat[1]===id)?1:(seat[2]===id)?2:0;
      if(col) applyMove(msg.r,msg.c,col);
    } else if(msg.type==='newgame'){
      const col=(seat[1]===id)?1:(seat[2]===id)?2:0;
      if(col){ resetBoard(); pushState(); }
    } else if(msg.type==='takeSeat'){
      doTakeSeat(id, msg.color);
    }
  }

  function recountSpecs(){
    specCount=conns.filter(x=> x.peer!==seat[1] && x.peer!==seat[2]).length;
  }

  // 관람객(id)이 원하는 색(color) 자리로 참여 → 그 색의 기존 플레이어는 관람석으로
  function doTakeSeat(id, color){
    if(color!==1 && color!==2) return;
    if(seat[1]===id || seat[2]===id) return;   // 이미 플레이어면 무시
    if(seat[color] && !gameOver) return;       // 찬 자리는 게임 종료 후에만 교대 가능(빈 자리는 언제든)
    seat[color]=id;                            // 신청자가 그 색 차지(기존 플레이어 자동 관람석)
    recountSpecs();
    resetBoard();                              // 새 판 시작
    pushState();
  }

  // ---------- 게스트: 참가 / 관람 ----------
  function join(role){
    $('playBtn').disabled=true; $('watchBtn').disabled=true;
    $('lobbyMsg').textContent='연결 중…';
    isHost=false;
    peer=new Peer();
    peer.on('open', ()=>{
      myId=peer.id;
      hostConn=peer.connect(ROOM_ID,{reliable:true});
      hostConn.on('open', ()=>hostConn.send({type:'hello', role}));
      hostConn.on('data', guestHandle);
      hostConn.on('close', ()=>{ if(inGame){ $('notice').textContent='호스트 연결이 끊겼습니다.'; updateStatus('연결 종료'); } });
    });
    peer.on('error', e=>{
      let m='연결 실패: '+e.type;
      if(e.type==='peer-unavailable') m='아직 방이 없어요. 먼저 "방 만들기"를 눌러주세요.';
      $('lobbyMsg').textContent=m;
      $('playBtn').disabled=false; $('watchBtn').disabled=false;
    });
  }
  $('playBtn').addEventListener('click', ()=>join('player'));
  $('watchBtn').addEventListener('click', ()=>join('spectator'));

  function guestHandle(msg){
    if(msg.type!=='state') return;
    board=msg.board; current=msg.current; gameOver=msg.gameOver;
    winner=msg.winner; lastMove=msg.lastMove;
    seat=msg.seat; specCount=msg.specCount;
    if(!inGame) enterGame();
    localRefresh();
  }

  // ---------- 공통 진입 ----------
  function enterGame(){
    if(inGame) return; inGame=true;
    $('lobby').classList.add('hidden');
    $('game').classList.remove('hidden');
    $('connState').textContent='연결됨 ✓';
    initCanvas();
  }

  // ---------- 상태 동기화 ----------
  function pushState(){          // 호스트 전용: 모두에게 보내고 본인 화면 갱신
    if(!isHost) return;
    const m={type:'state', board, current, gameOver, winner, lastMove, seat, specCount};
    conns.forEach(c=>{ try{ c.send(m); }catch(e){} });
    localRefresh();
  }

  function myColorNow(){ return (seat[1]===myId)?1:(seat[2]===myId)?2:0; }

  function localRefresh(){
    myColor=myColorNow();
    if(canvas) canvas.style.cursor=(myColor===0)?'default':'pointer';
    draw();
    updateSeats();
    detectOpponentChange();
    refreshStatus();
    refreshButtons();
  }

  // 좌석/관람 표시
  function label(id){
    if(!id) return '빈자리';
    if(id===myId) return '나';
    return '상대';
  }
  function updateSeats(){
    $('seatBlack').innerHTML='<span class="stone-dot black-dot"></span>흑: '+label(seat[1]);
    $('seatWhite').innerHTML='<span class="stone-dot white-dot"></span>백: '+label(seat[2]);
    $('seatSpec').textContent='👀 관람 '+specCount;
  }

  // 상대 입퇴장 알림 (플레이어 기준)
  function detectOpponentChange(){
    if(myColor===0){ lastOppId='__spec__'; return; }
    const oppId=seat[3-myColor];
    if(lastOppId==='__init__'){ lastOppId=oppId; return; }
    if(oppId!==lastOppId){
      if(oppId && !lastOppId) flashNotice('상대가 입장했습니다 ✓');
      else if(!oppId && lastOppId) flashNotice('상대가 나갔습니다');
      else if(oppId && lastOppId) flashNotice('상대가 교대되었습니다');
      lastOppId=oppId;
    }
  }
  let noticeTimer=null;
  function flashNotice(t){
    $('notice').textContent=t;
    clearTimeout(noticeTimer);
    noticeTimer=setTimeout(()=>{ $('notice').textContent=''; }, 4000);
  }

  // ---------- 버튼 ----------
  $('newGameBtn').addEventListener('click', ()=>{
    if(myColor===0) return;
    if(isHost){ resetBoard(); pushState(); }
    else hostConn?.send({type:'newgame'});
  });
  function takeSeat(color){
    if(myColor!==0) return;                       // 이미 플레이어면 무시
    if(isHost) doTakeSeat(myId, color);           // 호스트가 관람 상태일 때 포함
    else hostConn?.send({type:'takeSeat', color});
  }
  $('joinBlackBtn').addEventListener('click', ()=>takeSeat(1));
  $('joinWhiteBtn').addEventListener('click', ()=>takeSeat(2));
  $('leaveBtn').addEventListener('click', ()=>{
    if(confirm('방에서 나가시겠어요?')){
      try{ peer && peer.destroy(); }catch(e){}
      location.reload();
    }
  });

  function refreshButtons(){
    const iAmPlayer = myColor!==0;
    show('newGameBtn', iAmPlayer);
    // 관람객(호스트가 관람 상태가 된 경우 포함): 직접 흑/백 선택 참여
    //  - 빈 자리는 언제든, 찬 자리는 게임 종료 후에만 교대 가능
    const iAmSpec = (myColor===0);
    const blackOpen = !seat[1] || gameOver;
    const whiteOpen = !seat[2] || gameOver;
    show('joinBlackBtn', iAmSpec && blackOpen);
    show('joinWhiteBtn', iAmSpec && whiteOpen);
  }
  function show(id, on){ $(id).classList.toggle('hidden', !on); }

  // ---------- 게임 로직 ----------
  function resetBoard(){
    board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
    current=1; gameOver=false; winner=0; lastMove=null;   // 흑(1) 항상 선공, 색은 유지
  }
  function applyMove(r,c,player){       // 호스트에서만 실행
    if(gameOver || board[r][c]!==0 || player!==current) return;
    if(!seat[1] || !seat[2]) return;    // 두 자리 모두 차야 진행
    board[r][c]=player; lastMove={r,c};
    if(checkWin(r,c,player)){ gameOver=true; winner=player; }
    else current=(player===1?2:1);
    pushState();
  }
  function checkWin(r,c,p){
    const dirs=[[0,1],[1,0],[1,1],[1,-1]];
    for(const [dr,dc] of dirs){
      let n=1;
      for(const s of [1,-1]){
        let nr=r+dr*s, nc=c+dc*s;
        while(nr>=0&&nr<SIZE&&nc>=0&&nc<SIZE&&board[nr][nc]===p){ n++; nr+=dr*s; nc+=dc*s; }
      }
      if(n>=5) return true;
    }
    return false;
  }

  // ---------- 입력 ----------
  function sizeCanvas(){
    const avail = Math.min(window.innerWidth - 24, 560);
    CELL = Math.max(18, Math.min(36, Math.floor((avail - 36) / (SIZE-1))));
    PAD  = Math.round(CELL * 0.72);
    DIM  = PAD*2 + CELL*(SIZE-1);
    const dpr = window.devicePixelRatio || 1;
    canvas.width = DIM*dpr; canvas.height = DIM*dpr;
    canvas.style.width = DIM+'px'; canvas.style.height = DIM+'px';
    ctx.setTransform(1,0,0,1,0,0);
    ctx.scale(dpr,dpr);
  }
  function initCanvas(){
    canvas=$('board'); ctx=canvas.getContext('2d');
    sizeCanvas();
    canvas.addEventListener('click', onClick);
    window.addEventListener('resize', ()=>{ sizeCanvas(); draw(); });
    window.addEventListener('orientationchange', ()=>{ setTimeout(()=>{ sizeCanvas(); draw(); },200); });
  }
  function onClick(e){
    if(myColor===0 || gameOver) return;
    if(current!==myColor) return;
    if(!seat[1] || !seat[2]){ flashNotice('상대를 기다리는 중입니다'); return; }
    const rect=canvas.getBoundingClientRect();
    const c=Math.round((e.clientX-rect.left-PAD)/CELL);
    const r=Math.round((e.clientY-rect.top-PAD)/CELL);
    if(r<0||r>=SIZE||c<0||c>=SIZE||board[r][c]!==0) return;
    if(isHost) applyMove(r,c,myColor);
    else hostConn.send({type:'intent', r, c});
  }

  // ---------- 상태 표시 ----------
  function refreshStatus(){
    if(!seat[1] || !seat[2]){
      updateStatus('상대 플레이어를 기다리는 중…'); return;
    }
    if(gameOver){
      const name=winner===1?'⚫ 흑':'⚪ 백';
      let tail='';
      if(myColor!==0) tail = (winner===myColor)?' — 나의 승리! 🎉':' — 패배';
      else tail=' (관람)';
      updateStatus('게임 종료! '+name+' 승리'+tail); return;
    }
    const dot=current===1?'<span class="stone-dot black-dot"></span>':'<span class="stone-dot white-dot"></span>';
    let tail;
    if(myColor===0) tail='관람 중';
    else tail=(current===myColor)?'내 차례!':'상대 차례';
    updateStatus(dot+(current===1?'흑':'백')+' — '+tail);
  }
  function updateStatus(html){ $('status').innerHTML=html; }

  // ---------- 렌더링 ----------
  function draw(){
    if(!ctx||!board) return;
    ctx.clearRect(0,0,DIM,DIM);
    ctx.strokeStyle='#5c3a1e'; ctx.lineWidth=1;
    for(let i=0;i<SIZE;i++){
      const p=PAD+i*CELL;
      ctx.beginPath();ctx.moveTo(PAD,p);ctx.lineTo(DIM-PAD,p);ctx.stroke();
      ctx.beginPath();ctx.moveTo(p,PAD);ctx.lineTo(p,DIM-PAD);ctx.stroke();
    }
    const st=[3,7,11]; ctx.fillStyle='#5c3a1e';
    for(const r of st) for(const c of st){ ctx.beginPath();ctx.arc(PAD+c*CELL,PAD+r*CELL,3,0,Math.PI*2);ctx.fill(); }
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(board[r][c]) stone(r,c,board[r][c]);
    if(lastMove){
      ctx.strokeStyle='#e34b4b'; ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(PAD+lastMove.c*CELL,PAD+lastMove.r*CELL,CELL*0.42,0,Math.PI*2);ctx.stroke();
    }
  }
  function stone(r,c,p){
    const x=PAD+c*CELL, y=PAD+r*CELL, rad=CELL*0.42;
    const g=ctx.createRadialGradient(x-rad*0.3,y-rad*0.3,rad*0.1,x,y,rad);
    if(p===1){ g.addColorStop(0,'#666'); g.addColorStop(1,'#0a0a0a'); }
    else { g.addColorStop(0,'#fff'); g.addColorStop(1,'#c8c8c8'); }
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,rad,0,Math.PI*2); ctx.fill();
  }
})();
</script>
</body>
</html>
